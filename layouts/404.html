{{ define "main" }}
<div class="error-404">
  <div class="error-404__content glass">
    <span class="error-404__code">404</span>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <div class="error-404__actions">
      <a href="/" class="error-404__btn error-404__btn--primary">Back to Home</a>
      <a href="/blog/" class="error-404__btn">Read the Blog</a>
    </div>
  </div>
</div>

<style>
.error-404 {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 50vh;
  padding: 2rem;
}
.error-404__content {
  text-align: center;
  padding: 3rem 4rem;
  max-width: 500px;
}
.error-404__code {
  display: block;
  font-size: 5rem;
  font-weight: 900;
  line-height: 1;
  margin-bottom: 1rem;
  background: linear-gradient(135deg, #00c8a5, #0099cc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.error-404__content h1 {
  font-size: 1.5rem;
  font-weight: 700;
  margin: 0 0 0.75rem 0;
}
.error-404__content p {
  margin: 0 0 2rem;
  opacity: 0.6;
  font-size: 0.95rem;
  line-height: 1.5;
}
.error-404__actions {
  display: flex;
  gap: 0.75rem;
  justify-content: center;
}
.error-404__btn {
  padding: 0.6rem 1.5rem;
  border-radius: 10px;
  font-size: 0.88rem;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.25s ease;
  border: 1px solid rgba(255, 255, 255, 0.12);
  color: inherit;
}
.error-404__btn:hover {
  border-color: rgba(0, 200, 165, 0.3);
  background: rgba(0, 200, 165, 0.06);
}
.error-404__btn--primary {
  background: linear-gradient(135deg, #00c8a5, #0099cc);
  color: #0a0a0a;
  border: none;
  font-weight: 700;
}
.error-404__btn--primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0, 200, 165, 0.25);
}
:root:not(.dark) .error-404__btn {
  border-color: rgba(0, 0, 0, 0.1);
}
@media (max-width: 500px) {
  .error-404__content { padding: 2rem 1.5rem; }
  .error-404__code { font-size: 3.5rem; }
  .error-404__actions { flex-direction: column; }
}
</style>
{{ end }}
