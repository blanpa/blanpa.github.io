<style>
#blueprint-bg {
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  background-color: #0a0e14;
  overflow: hidden;
}

.bg-orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(100px);
  opacity: 0;
  will-change: transform, opacity;
}

.bg-orb--1 {
  width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(0, 200, 165, 0.28), transparent 70%);
  top: -15%; left: -10%;
  animation: orb-float-1 25s ease-in-out infinite, orb-fade-in 2s ease-out forwards;
}
.bg-orb--2 {
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(100, 70, 230, 0.22), transparent 70%);
  bottom: -15%; right: -10%;
  animation: orb-float-2 30s ease-in-out infinite, orb-fade-in 2s ease-out 0.3s forwards;
}
.bg-orb--3 {
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(0, 170, 220, 0.18), transparent 70%);
  top: 35%; right: 15%;
  animation: orb-float-3 22s ease-in-out infinite, orb-fade-in 2s ease-out 0.6s forwards;
}

#blueprint-bg::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(circle 450px at var(--mx, 50%) var(--my, 50%), rgba(0, 200, 165, 0.04), transparent 70%);
  transition: background 0.4s ease;
}

@keyframes orb-fade-in {
  to { opacity: 1; }
}

@keyframes orb-float-1 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33%      { transform: translate(80px, 60px) scale(1.1); }
  66%      { transform: translate(-40px, 30px) scale(0.95); }
}
@keyframes orb-float-2 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33%      { transform: translate(-70px, -50px) scale(1.08); }
  66%      { transform: translate(50px, -30px) scale(0.92); }
}
@keyframes orb-float-3 {
  0%, 100% { transform: translate(0, 0) scale(1); }
  33%      { transform: translate(60px, -40px) scale(1.05); }
  66%      { transform: translate(-50px, 50px) scale(0.97); }
}

html:not(.dark) #blueprint-bg {
  background-color: #f5f7fa;
}
html:not(.dark) .bg-orb--1 {
  background: radial-gradient(circle, rgba(0, 200, 165, 0.18), transparent 70%);
}
html:not(.dark) .bg-orb--2 {
  background: radial-gradient(circle, rgba(100, 70, 230, 0.14), transparent 70%);
}
html:not(.dark) .bg-orb--3 {
  background: radial-gradient(circle, rgba(0, 170, 220, 0.12), transparent 70%);
}

@media (prefers-reduced-motion: reduce) {
  .bg-orb { animation: orb-fade-in 1s ease-out forwards !important; }
}
</style>
<script>
document.addEventListener("DOMContentLoaded", function () {
  var bg = document.createElement("div");
  bg.id = "blueprint-bg";
  bg.innerHTML = '<div class="bg-orb bg-orb--1"></div><div class="bg-orb bg-orb--2"></div><div class="bg-orb bg-orb--3"></div>';
  document.body.prepend(bg);

  if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  var tx = 50, ty = 50, rafM = 0;
  document.addEventListener("mousemove", function (e) {
    tx = (e.clientX / window.innerWidth) * 100;
    ty = (e.clientY / window.innerHeight) * 100;
    if (!rafM) {
      rafM = requestAnimationFrame(function () {
        bg.style.setProperty("--mx", tx + "%");
        bg.style.setProperty("--my", ty + "%");
        rafM = 0;
      });
    }
  }, { passive: true });
});
</script>
