  Giscus comments. Requires the Giscus app installed on the repo
  (https://github.com/apps/giscus) and GitHub Discussions enabled.
  IDs below map to blanpa/blanpa.github.io › Announcements category.
-->
<script src="https://giscus.app/client.js"
  data-repo="blanpa/blanpa.github.io"
  data-repo-id="R_kgDOItRl2A"
  data-category="Announcements"
  data-category-id="DIC_kwDOItRl2M4C4xmJ"
  data-mapping="pathname"
  data-strict="0"
  data-reactions-enabled="1"
  data-emit-metadata="0"
  data-input-position="top"
  data-theme="noborder_dark"
  data-lang="en"
  data-loading="lazy"
  crossorigin="anonymous"
  async>
</script>
<script>
(function() {
  const observer = new MutationObserver(function() {
    const isDark = document.documentElement.classList.contains('dark');
    const iframe = document.querySelector('iframe.giscus-frame');
    if (iframe) {
      iframe.contentWindow.postMessage(
        { giscus: { setConfig: { theme: isDark ? 'noborder_dark' : 'noborder_light' } } },
        'https://giscus.app'
      );
    }
  });
  observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
})();
</script>
