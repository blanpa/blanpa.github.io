{{ $formspreeId := .Get "id" | default "YOUR_FORMSPREE_ID" }}
{{ $uid := .Page.File.UniqueID }}

<form id="contact-form-{{ $uid }}" class="contact-form">
  <div class="form-group">
    <label for="contact-name-{{ $uid }}">Name</label>
    <input type="text" id="contact-name-{{ $uid }}" name="name" required placeholder="Your name">
  </div>
  <div class="form-group">
    <label for="contact-email-{{ $uid }}">Email</label>
    <input type="email" id="contact-email-{{ $uid }}" name="email" required placeholder="your@email.com">
  </div>
  <div class="form-group">
    <label for="contact-subject-{{ $uid }}">Subject</label>
    <select id="contact-subject-{{ $uid }}" name="subject" required>
      <option value="" disabled selected>Select a topic</option>
      <option value="Custom Node-RED Module">Custom Node-RED Module</option>
      <option value="Protocol Integration">Protocol Integration</option>
      <option value="Edge-to-Cloud Architecture">Edge-to-Cloud Architecture</option>
      <option value="Data Engineering">Data Engineering & Automation</option>
      <option value="Other">Other</option>
    </select>
  </div>
  <div class="form-group">
    <label for="contact-message-{{ $uid }}">Message</label>
    <textarea id="contact-message-{{ $uid }}" name="message" rows="6" required placeholder="Tell me about your project..."></textarea>
  </div>
  <input type="text" name="_gotcha" style="display:none">
  <button type="submit" class="contact-submit">Send Message</button>
  <p class="form-status" id="form-status-{{ $uid }}"></p>
</form>

<script>
document.getElementById('contact-form-{{ $uid }}').addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = this.querySelector('.contact-submit');
  const status = document.getElementById('form-status-{{ $uid }}');
  btn.disabled = true;
  btn.textContent = 'Sending...';
  status.textContent = '';
  status.className = 'form-status';
  try {
    const res = await fetch('https://formspree.io/f/{{ $formspreeId }}', {
      method: 'POST',
      body: new FormData(this),
      headers: { 'Accept': 'application/json' }
    });
    if (res.ok) {
      status.textContent = 'Message sent successfully!';
      status.classList.add('form-status--success');
      this.reset();
    } else {
      status.textContent = 'Something went wrong. Please try again.';
      status.classList.add('form-status--error');
    }
  } catch {
    status.textContent = 'Connection error. Please try again.';
    status.classList.add('form-status--error');
  }
  btn.disabled = false;
  btn.textContent = 'Send Message';
});
</script>

<style>
.contact-form {
  max-width: 640px;
  margin: 2rem 0;
  padding: 2rem;
  border-radius: 0.75rem;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
}

.form-group {
  margin-bottom: 1.5rem;
}

.form-group label {
  display: block;
  margin-bottom: 0.5rem;
  font-weight: 700;
  font-size: 0.95rem;
  color: #e5e5e5;
}

.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 0.75rem 1rem;
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 0.5rem;
  background: rgba(255, 255, 255, 0.08);
  color: #f5f5f5;
  font-family: inherit;
  font-size: 0.95rem;
  transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  box-sizing: border-box;
}

.form-group input::placeholder,
.form-group textarea::placeholder {
  color: rgba(255, 255, 255, 0.4);
}

.form-group select option {
  background: #1a1a1a;
  color: #f5f5f5;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  outline: none;
  border-color: #00c8a5;
  box-shadow: 0 0 0 3px rgba(0, 200, 165, 0.2);
  background: rgba(255, 255, 255, 0.12);
}

.form-group textarea {
  resize: vertical;
  min-height: 140px;
}

.contact-submit {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.75rem 2rem;
  background: #00c8a5;
  color: #0a0a0a;
  border: none;
  border-radius: 0.5rem;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
}

.contact-submit:hover {
  background: #00ddb8;
  transform: translateY(-2px);
  box-shadow: 0 4px 15px rgba(0, 200, 165, 0.3);
}

.contact-submit:active {
  transform: translateY(0);
  box-shadow: none;
}

.contact-submit:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}

.form-status {
  margin-top: 1rem;
  font-size: 0.9rem;
  font-weight: 600;
  min-height: 1.4em;
}
.form-status--success {
  color: #00c8a5;
}
.form-status--error {
  color: #ff6b6b;
}

/* Light mode overrides */
:root:not(.dark) .contact-form {
  background: rgba(0, 0, 0, 0.03);
  border-color: rgba(0, 0, 0, 0.1);
}

:root:not(.dark) .form-group label {
  color: #1a1a1a;
}

:root:not(.dark) .form-group input,
:root:not(.dark) .form-group select,
:root:not(.dark) .form-group textarea {
  background: #ffffff;
  border-color: #d4d4d4;
  color: #1a1a1a;
}

:root:not(.dark) .form-group input::placeholder,
:root:not(.dark) .form-group textarea::placeholder {
  color: #9a9a9a;
}

:root:not(.dark) .form-group select option {
  background: #ffffff;
  color: #1a1a1a;
}

:root:not(.dark) .form-group input:focus,
:root:not(.dark) .form-group select:focus,
:root:not(.dark) .form-group textarea:focus {
  border-color: #00c8a5;
  background: #ffffff;
}

:root:not(.dark) .form-status--success {
  color: #008a70;
}
</style>
