{{ $id := .Get "id" }}
{{ if not $id }}{{ errorf "contact-modal shortcode requires an 'id' (Formspree form id) — called from %s" .Page.File.Path }}{{ end }}

<button class="home-contact-btn" type="button" data-open-dialog="contact-dialog">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
  <span>Get in Touch</span>
</button>

<dialog id="contact-dialog" class="contact-dialog" aria-label="Contact form">
  <div class="contact-dialog__inner">
    <button class="contact-dialog__close" type="button" data-close-dialog aria-label="Close">&times;</button>
    <h2>Get in Touch</h2>
    {{ partial "contact-form.html" (dict "id" $id "uid" "modal") }}
  </div>
</dialog>
