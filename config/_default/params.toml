colorScheme = "noir"
defaultAppearance = "dark"
autoSwitchAppearance = true

enableSearch = true
enableCodeCopy = true
mainSections = ["blog"]
disableImageOptimization = false
highlightCurrentMenuArea = true
smartTOC = true

[header]
  layout = "fixed-fill-blur"

[footer]
  showMenu = true
  showCopyright = true
  showThemeAttribution = false
  showAppearanceSwitcher = true
  showScrollToTop = true

[homepage]
  layout = "profile"
  homepageImage = ""
  showRecent = false

[article]
  showDate = true
  showDateUpdated = false
  showAuthor = false
  showHero = true
  heroStyle = "background"
  layoutBackgroundBlur = true
  layoutBackgroundHeaderSpace = true
  showBreadcrumbs = true
  showDraftLabel = true
  showEdit = false
  showPagination = true
  showReadingTime = true
  showTableOfContents = true
  showRelatedContent = true
  relatedContentLimit = 3
  showTaxonomies = true
  showWordCount = false
  showZenMode = false
  sharingLinks = ["linkedin", "twitter", "reddit", "email"]

[list]
  showHero = true
  heroStyle = "background"
  layoutBackgroundBlur = true
  layoutBackgroundHeaderSpace = false
  showBreadcrumbs = true
  showCards = true
  orderByWeight = true
  groupByYear = false
  cardView = true
  cardViewScreenWidth = false

[taxonomy]
  showTermCount = true
  showHero = true
  heroStyle = "background"
  cardView = false

[term]
  showHero = true
  heroStyle = "background"
  groupByYear = false
  cardView = true
  cardViewScreenWidth = false

[buymeacoffee]
  identifier = "blanpa"
  globalWidget = false
  globalWidgetMessage = ""
  globalWidgetColor = "#FFDD00"
  globalWidgetPosition = "right"

[author]
  name = "blanpa"
  image = "img/author.png"
  headline = "IIoT Software Developer"
  bio = "Building industrial connectivity solutions with Node-RED, OPC-UA, NATS, and edge computing."
  links = [
    { github = "https://github.com/blanpa" },
    { linkedin = "https://linkedin.com/in/blanpa" },
    { medium = "https://medium.com/@blanpa" },
    { email = "mailto:blanpa@proton.me" },
    { ko-fi = "https://ko-fi.com/blanpa" },
    { heart-empty = "https://github.com/sponsors/blanpa" },
  ]
