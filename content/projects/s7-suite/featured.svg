<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/><line x1="800" y1="0" x2="800" y2="600"/>
    <line x1="1000" y1="0" x2="1000" y2="600"/>
  </g>
  <!-- PLC rack visualization -->
  <rect x="380" y="180" width="440" height="240" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <!-- CPU module -->
  <rect x="400" y="200" width="60" height="200" rx="4" fill="#009999" opacity="0.8"/>
  <text x="430" y="310" fill="white" font-family="monospace" font-size="11" text-anchor="middle" transform="rotate(-90,430,310)">CPU 1500</text>
  <!-- I/O modules -->
  <rect x="475" y="200" width="50" height="200" rx="4" fill="rgba(34,211,238,0.3)" stroke="#22d3ee" stroke-width="1"/>
  <rect x="535" y="200" width="50" height="200" rx="4" fill="rgba(34,211,238,0.3)" stroke="#22d3ee" stroke-width="1"/>
  <rect x="595" y="200" width="50" height="200" rx="4" fill="rgba(34,211,238,0.3)" stroke="#22d3ee" stroke-width="1"/>
  <rect x="655" y="200" width="50" height="200" rx="4" fill="rgba(34,211,238,0.3)" stroke="#22d3ee" stroke-width="1"/>
  <rect x="715" y="200" width="50" height="200" rx="4" fill="rgba(34,211,238,0.2)" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Module labels -->
  <text x="500" y="310" fill="#22d3ee" font-family="monospace" font-size="10" text-anchor="middle" transform="rotate(-90,500,310)">DI 32</text>
  <text x="560" y="310" fill="#22d3ee" font-family="monospace" font-size="10" text-anchor="middle" transform="rotate(-90,560,310)">DO 32</text>
  <text x="620" y="310" fill="#22d3ee" font-family="monospace" font-size="10" text-anchor="middle" transform="rotate(-90,620,310)">AI 8</text>
  <text x="680" y="310" fill="#22d3ee" font-family="monospace" font-size="10" text-anchor="middle" transform="rotate(-90,680,310)">AO 4</text>
  <text x="740" y="310" fill="#94a3b8" font-family="monospace" font-size="10" text-anchor="middle" transform="rotate(-90,740,310)">DB</text>
  <!-- Connection line -->
  <line x1="430" y1="420" x2="430" y2="480" stroke="#009999" stroke-width="2"/>
  <line x1="430" y1="480" x2="600" y2="480" stroke="#009999" stroke-width="2"/>
  <!-- Node-RED box -->
  <rect x="520" y="460" width="160" height="40" rx="6" fill="rgba(143,0,0,0.3)" stroke="#8F0000" stroke-width="2"/>
  <text x="600" y="486" fill="white" font-family="system-ui, sans-serif" font-size="15" text-anchor="middle" font-weight="bold">Node-RED</text>
  <!-- Data flow dots -->
  <circle cx="470" cy="450" r="3" fill="#22d3ee" opacity="0.6"/>
  <circle cx="490" cy="460" r="3" fill="#22d3ee" opacity="0.4"/>
  <circle cx="510" cy="470" r="3" fill="#22d3ee" opacity="0.8"/>
  <!-- Title -->
  <text x="60" y="80" fill="white" font-family="system-ui, sans-serif" font-size="42" font-weight="bold">S7 Suite</text>
  <text x="60" y="120" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="22">Siemens S7 PLC Communication</text>
  <!-- Badges -->
  <rect x="60" y="500" width="120" height="36" rx="18" fill="#8F0000"/>
  <text x="120" y="524" fill="white" font-family="system-ui, sans-serif" font-size="15" text-anchor="middle" font-weight="bold">Node-RED</text>
  <rect x="195" y="500" width="110" height="36" rx="18" fill="rgba(255,255,255,0.1)"/>
  <text x="250" y="524" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="15" text-anchor="middle">TypeScript</text>
  <rect x="320" y="500" width="80" height="36" rx="18" fill="rgba(0,153,153,0.3)"/>
  <text x="360" y="524" fill="#009999" font-family="system-ui, sans-serif" font-size="15" text-anchor="middle">S7</text>
</svg>
