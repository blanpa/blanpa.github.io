<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <!-- Grid -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/><line x1="800" y1="0" x2="800" y2="600"/>
    <line x1="1000" y1="0" x2="1000" y2="600"/>
  </g>
  <!-- PLC rack visualization -->
  <rect x="350" y="170" width="500" height="250" rx="8" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <!-- ControlLogix CPU -->
  <rect x="370" y="190" width="65" height="210" rx="4" fill="#c41230" opacity="0.8"/>
  <text x="402" y="305" fill="white" font-family="monospace" font-size="10" text-anchor="middle" transform="rotate(-90,402,305)">ControlLogix</text>
  <!-- I/O modules -->
  <rect x="450" y="190" width="50" height="210" rx="4" fill="rgba(196,18,48,0.3)" stroke="#c41230" stroke-width="1"/>
  <rect x="510" y="190" width="50" height="210" rx="4" fill="rgba(196,18,48,0.3)" stroke="#c41230" stroke-width="1"/>
  <rect x="570" y="190" width="50" height="210" rx="4" fill="rgba(196,18,48,0.3)" stroke="#c41230" stroke-width="1"/>
  <!-- Legacy PLC -->
  <rect x="660" y="190" width="65" height="210" rx="4" fill="rgba(168,162,158,0.3)" stroke="#a8a29e" stroke-width="1"/>
  <text x="692" y="305" fill="#a8a29e" font-family="monospace" font-size="10" text-anchor="middle" transform="rotate(-90,692,305)">SLC 500</text>
  <!-- Another legacy -->
  <rect x="740" y="190" width="65" height="210" rx="4" fill="rgba(168,162,158,0.2)" stroke="#a8a29e" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="772" y="305" fill="#78716c" font-family="monospace" font-size="10" text-anchor="middle" transform="rotate(-90,772,305)">PLC-5</text>
  <!-- Module labels -->
  <text x="475" y="305" fill="#f87171" font-family="monospace" font-size="10" text-anchor="middle" transform="rotate(-90,475,305)">DI 32</text>
  <text x="535" y="305" fill="#f87171" font-family="monospace" font-size="10" text-anchor="middle" transform="rotate(-90,535,305)">DO 32</text>
  <text x="595" y="305" fill="#f87171" font-family="monospace" font-size="10" text-anchor="middle" transform="rotate(-90,595,305)">AI 8</text>
  <!-- EtherNet/IP connection line -->
  <line x1="402" y1="420" x2="402" y2="470" stroke="#c41230" stroke-width="2"/>
  <line x1="402" y1="470" x2="600" y2="470" stroke="#c41230" stroke-width="2"/>
  <line x1="692" y1="420" x2="692" y2="470" stroke="#a8a29e" stroke-width="1.5" stroke-dasharray="4,4"/>
  <line x1="692" y1="470" x2="600" y2="470" stroke="#a8a29e" stroke-width="1.5" stroke-dasharray="4,4"/>
  <!-- Protocol label -->
  <text x="600" y="465" fill="#94a3b8" font-family="monospace" font-size="11" text-anchor="middle">EtherNet/IP</text>
  <!-- Node-RED box -->
  <rect x="520" y="490" width="160" height="40" rx="6" fill="rgba(143,0,0,0.3)" stroke="#8F0000" stroke-width="2"/>
  <text x="600" y="516" fill="white" font-family="system-ui, sans-serif" font-size="15" text-anchor="middle" font-weight="bold">Node-RED</text>
  <!-- Data flow dots -->
  <circle cx="450" cy="440" r="3" fill="#f87171" opacity="0.6"/>
  <circle cx="500" cy="455" r="3" fill="#f87171" opacity="0.4"/>
  <circle cx="540" cy="478" r="3" fill="#f87171" opacity="0.8"/>
  <!-- Title -->
  <text x="60" y="80" fill="white" font-family="system-ui, sans-serif" font-size="42" font-weight="bold">CIP Suite</text>
  <text x="60" y="120" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="22">EtherNet/IP &amp; Allen-Bradley PLCs</text>
  <!-- Badges -->
  <rect x="60" y="500" width="120" height="36" rx="18" fill="#8F0000"/>
  <text x="120" y="524" fill="white" font-family="system-ui, sans-serif" font-size="15" text-anchor="middle" font-weight="bold">Node-RED</text>
  <rect x="195" y="500" width="110" height="36" rx="18" fill="rgba(255,255,255,0.1)"/>
  <text x="250" y="524" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="15" text-anchor="middle">TypeScript</text>
  <rect x="320" y="500" width="80" height="36" rx="18" fill="rgba(196,18,48,0.3)"/>
  <text x="360" y="524" fill="#c41230" font-family="system-ui, sans-serif" font-size="15" text-anchor="middle">CIP</text>
</svg>
