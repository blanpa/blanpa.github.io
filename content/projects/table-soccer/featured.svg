<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="field" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#065f46;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#064e3b;stop-opacity:0.4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <!-- Field -->
  <rect x="300" y="200" width="600" height="300" rx="8" fill="url(#field)" stroke="#10b981" stroke-width="2" opacity="0.6"/>
  <!-- Center line & circle -->
  <line x1="600" y1="200" x2="600" y2="500" stroke="#10b981" stroke-width="1.5" opacity="0.3"/>
  <circle cx="600" cy="350" r="50" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.3"/>
  <!-- Goals -->
  <rect x="280" y="300" width="20" height="100" rx="4" fill="rgba(239,68,68,0.3)" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="900" y="300" width="20" height="100" rx="4" fill="rgba(59,130,246,0.3)" stroke="#3b82f6" stroke-width="1.5"/>
  <!-- Player rods (horizontal lines) -->
  <g stroke="rgba(255,255,255,0.2)" stroke-width="3">
    <line x1="400" y1="200" x2="400" y2="500"/>
    <line x1="500" y1="200" x2="500" y2="500"/>
    <line x1="700" y1="200" x2="700" y2="500"/>
    <line x1="800" y1="200" x2="800" y2="500"/>
  </g>
  <!-- Players on rods -->
  <g>
    <rect x="390" y="280" width="20" height="30" rx="4" fill="#ef4444" opacity="0.7"/>
    <rect x="390" y="380" width="20" height="30" rx="4" fill="#ef4444" opacity="0.7"/>
    <rect x="490" y="250" width="20" height="30" rx="4" fill="#ef4444" opacity="0.7"/>
    <rect x="490" y="330" width="20" height="30" rx="4" fill="#ef4444" opacity="0.7"/>
    <rect x="490" y="410" width="20" height="30" rx="4" fill="#ef4444" opacity="0.7"/>
    <rect x="690" y="250" width="20" height="30" rx="4" fill="#3b82f6" opacity="0.7"/>
    <rect x="690" y="330" width="20" height="30" rx="4" fill="#3b82f6" opacity="0.7"/>
    <rect x="690" y="410" width="20" height="30" rx="4" fill="#3b82f6" opacity="0.7"/>
    <rect x="790" y="280" width="20" height="30" rx="4" fill="#3b82f6" opacity="0.7"/>
    <rect x="790" y="380" width="20" height="30" rx="4" fill="#3b82f6" opacity="0.7"/>
  </g>
  <!-- Ball -->
  <circle cx="580" cy="340" r="8" fill="white" opacity="0.9"/>
  <!-- Score display -->
  <rect x="520" y="160" width="70" height="30" rx="6" fill="rgba(239,68,68,0.2)" stroke="#ef4444" stroke-width="1"/>
  <text x="555" y="181" fill="#fca5a5" font-family="monospace" font-size="18" text-anchor="middle" font-weight="bold">3</text>
  <rect x="610" y="160" width="70" height="30" rx="6" fill="rgba(59,130,246,0.2)" stroke="#3b82f6" stroke-width="1"/>
  <text x="645" y="181" fill="#93c5fd" font-family="monospace" font-size="18" text-anchor="middle" font-weight="bold">2</text>
  <!-- CAN bus label -->
  <rect x="950" y="330" width="180" height="40" rx="8" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1"/>
  <text x="1040" y="356" fill="#fbbf24" font-family="monospace" font-size="14" text-anchor="middle">CAN Bus Control</text>
  <line x1="920" y1="350" x2="950" y2="350" stroke="#f59e0b" stroke-width="1.5" opacity="0.4"/>
  <!-- Title -->
  <text x="60" y="80" fill="white" font-family="system-ui, sans-serif" font-size="42" font-weight="bold">Automated Table Soccer</text>
  <text x="60" y="120" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="22">Revolution Pi · Linear Motors · CAN Bus</text>
  <!-- Badges -->
  <rect x="60" y="520" width="130" height="36" rx="18" fill="rgba(255,255,255,0.1)"/>
  <text x="125" y="544" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="15" text-anchor="middle">Revolution Pi</text>
  <rect x="205" y="520" width="110" height="36" rx="18" fill="rgba(245,158,11,0.2)"/>
  <text x="260" y="544" fill="#fbbf24" font-family="system-ui, sans-serif" font-size="15" text-anchor="middle">CAN Bus</text>
</svg>
