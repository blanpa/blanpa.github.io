<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <!-- Data silos -->
  <rect x="150" y="200" width="160" height="70" rx="10" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="230" y="242" fill="#c4b5fd" font-family="monospace" font-size="16" text-anchor="middle">Historian</text>
  <rect x="150" y="300" width="160" height="70" rx="10" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="230" y="342" fill="#c4b5fd" font-family="monospace" font-size="16" text-anchor="middle">MES</text>
  <rect x="150" y="400" width="160" height="70" rx="10" fill="rgba(139,92,246,0.2)" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="230" y="442" fill="#c4b5fd" font-family="monospace" font-size="16" text-anchor="middle">SCADA</text>
  <!-- Lines to API -->
  <g stroke="#8b5cf6" stroke-width="2" opacity="0.4">
    <line x1="310" y1="235" x2="480" y2="340"/>
    <line x1="310" y1="335" x2="480" y2="340"/>
    <line x1="310" y1="435" x2="480" y2="340"/>
  </g>
  <!-- i3X API block -->
  <rect x="480" y="290" width="240" height="100" rx="16" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="2"/>
  <text x="600" y="335" fill="#22d3ee" font-family="system-ui, sans-serif" font-size="28" text-anchor="middle" font-weight="bold">i3X API</text>
  <text x="600" y="370" fill="#67e8f9" font-family="monospace" font-size="14" text-anchor="middle">REST · SSE · Auth</text>
  <!-- Lines to Node-RED -->
  <g stroke="#22d3ee" stroke-width="2" opacity="0.4">
    <line x1="720" y1="340" x2="860" y2="340"/>
  </g>
  <!-- Arrow -->
  <polygon points="855,330 875,340 855,350" fill="#22d3ee" opacity="0.6"/>
  <!-- Node-RED block -->
  <rect x="880" y="290" width="200" height="100" rx="16" fill="#8F0000" opacity="0.8"/>
  <text x="980" y="348" fill="white" font-family="system-ui, sans-serif" font-size="24" text-anchor="middle" font-weight="bold">Node-RED</text>
  <!-- Title -->
  <text x="60" y="80" fill="white" font-family="system-ui, sans-serif" font-size="42" font-weight="bold">i3X Manufacturing API</text>
  <text x="60" y="120" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="22">Vendor-Agnostic Industrial Data Access</text>
  <!-- CESMII badge -->
  <rect x="60" y="500" width="100" height="36" rx="18" fill="rgba(139,92,246,0.3)" stroke="#8b5cf6" stroke-width="1"/>
  <text x="110" y="524" fill="#c4b5fd" font-family="system-ui, sans-serif" font-size="15" text-anchor="middle">CESMII</text>
  <rect x="175" y="500" width="80" height="36" rx="18" fill="rgba(255,255,255,0.1)"/>
  <text x="215" y="524" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="15" text-anchor="middle">REST</text>
</svg>
