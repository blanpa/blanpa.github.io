<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <!-- Signal wave -->
  <path d="M0 350 Q50 350 100 300 Q150 250 200 350 Q250 450 300 300 Q350 150 400 350 Q450 550 500 300 Q550 50 600 350 Q650 450 700 280 Q750 180 800 350 Q850 420 900 320 Q950 250 1000 350 Q1050 400 1100 340 L1200 350" fill="none" stroke="#22d3ee" stroke-width="3" opacity="0.6"/>
  <!-- Anomaly spike -->
  <path d="M500 300 L520 80 L540 300" fill="none" stroke="#ef4444" stroke-width="3" opacity="0.8"/>
  <circle cx="520" cy="80" r="8" fill="#ef4444" opacity="0.8"/>
  <!-- Threshold line -->
  <line x1="0" y1="150" x2="1200" y2="150" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="10,10" opacity="0.4"/>
  <text x="1180" y="142" fill="#f59e0b" font-family="monospace" font-size="14" text-anchor="end" opacity="0.5">THRESHOLD</text>
  <!-- Grid -->
  <g stroke="rgba(255,255,255,0.05)" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="600"/><line x1="400" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="600" y2="600"/><line x1="800" y1="0" x2="800" y2="600"/>
    <line x1="1000" y1="0" x2="1000" y2="600"/>
  </g>
  <!-- Title -->
  <text x="60" y="80" fill="white" font-family="system-ui, sans-serif" font-size="42" font-weight="bold">Condition Monitoring</text>
  <text x="60" y="120" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="22">Predictive Maintenance &amp; Anomaly Detection</text>
  <!-- Node-RED badge -->
  <rect x="60" y="500" width="120" height="36" rx="18" fill="#8F0000"/>
  <text x="120" y="524" fill="white" font-family="system-ui, sans-serif" font-size="15" text-anchor="middle" font-weight="bold">Node-RED</text>
  <rect x="195" y="500" width="60" height="36" rx="18" fill="rgba(255,255,255,0.1)"/>
  <text x="225" y="524" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="15" text-anchor="middle">ML</text>
  <rect x="270" y="500" width="70" height="36" rx="18" fill="rgba(255,255,255,0.1)"/>
  <text x="305" y="524" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="15" text-anchor="middle">FFT</text>
</svg>
