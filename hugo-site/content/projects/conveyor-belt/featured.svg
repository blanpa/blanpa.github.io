<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <!-- Conveyor belt -->
  <rect x="100" y="380" width="1000" height="40" rx="6" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- Belt segments -->
  <g stroke="rgba(255,255,255,0.1)" stroke-width="1">
    <line x1="200" y1="380" x2="200" y2="420"/><line x1="300" y1="380" x2="300" y2="420"/>
    <line x1="400" y1="380" x2="400" y2="420"/><line x1="500" y1="380" x2="500" y2="420"/>
    <line x1="600" y1="380" x2="600" y2="420"/><line x1="700" y1="380" x2="700" y2="420"/>
    <line x1="800" y1="380" x2="800" y2="420"/><line x1="900" y1="380" x2="900" y2="420"/>
    <line x1="1000" y1="380" x2="1000" y2="420"/>
  </g>
  <!-- Objects on belt -->
  <circle cx="350" cy="360" r="20" fill="#ef4444" opacity="0.7"/>
  <rect x="560" y="345" width="30" height="30" fill="#3b82f6" opacity="0.7"/>
  <polygon points="800,340 820,370 780,370" fill="#10b981" opacity="0.7"/>
  <!-- Sensors above -->
  <rect x="270" y="280" width="100" height="50" rx="8" fill="rgba(245,158,11,0.15)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="320" y="310" fill="#fbbf24" font-family="monospace" font-size="12" text-anchor="middle">Inductive</text>
  <line x1="320" y1="330" x2="320" y2="380" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <rect x="500" y="280" width="100" height="50" rx="8" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="550" y="310" fill="#67e8f9" font-family="monospace" font-size="12" text-anchor="middle">Color</text>
  <line x1="550" y1="330" x2="550" y2="380" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <rect x="720" y="260" width="100" height="60" rx="8" fill="rgba(139,92,246,0.15)" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="770" y="288" fill="#c4b5fd" font-family="monospace" font-size="12" text-anchor="middle">Camera</text>
  <text x="770" y="306" fill="#a78bfa" font-family="monospace" font-size="11" text-anchor="middle">+ ML</text>
  <line x1="770" y1="320" x2="770" y2="380" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
  <!-- Pneumatic ejectors -->
  <rect x="380" y="420" width="20" height="60" rx="4" fill="rgba(239,68,68,0.3)" stroke="#ef4444" stroke-width="1"/>
  <text x="390" y="500" fill="#fca5a5" font-family="monospace" font-size="11" text-anchor="middle">Eject 1</text>
  <rect x="640" y="420" width="20" height="60" rx="4" fill="rgba(59,130,246,0.3)" stroke="#3b82f6" stroke-width="1"/>
  <text x="650" y="500" fill="#93c5fd" font-family="monospace" font-size="11" text-anchor="middle">Eject 2</text>
  <!-- Direction arrow -->
  <line x1="150" y1="400" x2="1050" y2="400" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <polygon points="1045,395 1060,400 1045,405" fill="rgba(255,255,255,0.2)"/>
  <!-- Title -->
  <text x="60" y="80" fill="white" font-family="system-ui, sans-serif" font-size="42" font-weight="bold">Conveyor Belt Sorting</text>
  <text x="60" y="120" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="22">PLC + Sensors + ML Classification</text>
  <!-- Badges -->
  <rect x="60" y="180" width="110" height="36" rx="18" fill="rgba(255,255,255,0.1)"/>
  <text x="115" y="204" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="15" text-anchor="middle">PiXtend</text>
  <rect x="185" y="180" width="80" height="36" rx="18" fill="rgba(139,92,246,0.3)"/>
  <text x="225" y="204" fill="#c4b5fd" font-family="system-ui, sans-serif" font-size="15" text-anchor="middle">ML</text>
</svg>
