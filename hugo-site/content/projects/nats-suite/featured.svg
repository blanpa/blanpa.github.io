<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <!-- Message flow lines -->
  <g stroke="#22d3ee" stroke-width="2" opacity="0.3">
    <line x1="300" y1="250" x2="600" y2="200"/><line x1="300" y1="250" x2="600" y2="300"/>
    <line x1="300" y1="250" x2="600" y2="400"/>
    <line x1="600" y1="200" x2="900" y2="180"/><line x1="600" y1="200" x2="900" y2="250"/>
    <line x1="600" y1="300" x2="900" y2="320"/><line x1="600" y1="400" x2="900" y2="420"/>
  </g>
  <!-- Publisher node -->
  <rect x="220" y="220" width="160" height="60" rx="12" fill="#27AE60" opacity="0.9"/>
  <text x="300" y="257" fill="white" font-family="monospace" font-size="18" text-anchor="middle" font-weight="bold">PUBLISH</text>
  <!-- Subject nodes -->
  <rect x="530" y="170" width="140" height="50" rx="10" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="1"/>
  <text x="600" y="201" fill="#22d3ee" font-family="monospace" font-size="14" text-anchor="middle">sensor.temp</text>
  <rect x="530" y="270" width="140" height="50" rx="10" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="1"/>
  <text x="600" y="301" fill="#22d3ee" font-family="monospace" font-size="14" text-anchor="middle">sensor.vibr</text>
  <rect x="530" y="370" width="140" height="50" rx="10" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="1"/>
  <text x="600" y="401" fill="#22d3ee" font-family="monospace" font-size="14" text-anchor="middle">machine.&gt;</text>
  <!-- Subscriber nodes -->
  <rect x="830" y="155" width="140" height="50" rx="10" fill="#8F0000" opacity="0.8"/>
  <text x="900" y="186" fill="white" font-family="monospace" font-size="14" text-anchor="middle">SUB 1</text>
  <rect x="830" y="225" width="140" height="50" rx="10" fill="#8F0000" opacity="0.8"/>
  <text x="900" y="256" fill="white" font-family="monospace" font-size="14" text-anchor="middle">SUB 2</text>
  <rect x="830" y="295" width="140" height="50" rx="10" fill="#8F0000" opacity="0.8"/>
  <text x="900" y="326" fill="white" font-family="monospace" font-size="14" text-anchor="middle">SUB 3</text>
  <rect x="830" y="395" width="140" height="50" rx="10" fill="#8F0000" opacity="0.8"/>
  <text x="900" y="426" fill="white" font-family="monospace" font-size="14" text-anchor="middle">SUB 4</text>
  <!-- Moving dots on lines -->
  <circle cx="450" cy="230" r="4" fill="#22d3ee" opacity="0.8"/>
  <circle cx="480" cy="280" r="4" fill="#22d3ee" opacity="0.6"/>
  <circle cx="750" cy="260" r="4" fill="#22d3ee" opacity="0.7"/>
  <!-- Title -->
  <text x="60" y="80" fill="white" font-family="system-ui, sans-serif" font-size="42" font-weight="bold">NATS Messaging Suite</text>
  <text x="60" y="120" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="22">Pub/Sub · JetStream · Key-Value Store</text>
  <!-- Badges -->
  <rect x="60" y="500" width="120" height="36" rx="18" fill="#8F0000"/>
  <text x="120" y="524" fill="white" font-family="system-ui, sans-serif" font-size="15" text-anchor="middle" font-weight="bold">Node-RED</text>
  <rect x="195" y="500" width="80" height="36" rx="18" fill="#27AE60"/>
  <text x="235" y="524" fill="white" font-family="system-ui, sans-serif" font-size="15" text-anchor="middle" font-weight="bold">NATS</text>
</svg>
