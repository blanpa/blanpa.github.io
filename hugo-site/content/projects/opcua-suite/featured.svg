<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <!-- PLC boxes -->
  <rect x="100" y="220" width="150" height="70" rx="10" fill="rgba(16,185,129,0.15)" stroke="#10b981" stroke-width="1.5"/>
  <text x="175" y="262" fill="#6ee7b7" font-family="monospace" font-size="15" text-anchor="middle">Siemens</text>
  <rect x="100" y="320" width="150" height="70" rx="10" fill="rgba(16,185,129,0.15)" stroke="#10b981" stroke-width="1.5"/>
  <text x="175" y="362" fill="#6ee7b7" font-family="monospace" font-size="15" text-anchor="middle">Beckhoff</text>
  <rect x="100" y="420" width="150" height="70" rx="10" fill="rgba(16,185,129,0.15)" stroke="#10b981" stroke-width="1.5"/>
  <text x="175" y="462" fill="#6ee7b7" font-family="monospace" font-size="15" text-anchor="middle">Allen-Bradley</text>
  <!-- Lines to OPC-UA -->
  <g stroke="#10b981" stroke-width="2" opacity="0.3">
    <line x1="250" y1="255" x2="430" y2="360"/>
    <line x1="250" y1="355" x2="430" y2="360"/>
    <line x1="250" y1="455" x2="430" y2="360"/>
  </g>
  <!-- OPC-UA block -->
  <rect x="430" y="300" width="280" height="120" rx="16" fill="rgba(59,130,246,0.15)" stroke="#3b82f6" stroke-width="2"/>
  <text x="570" y="350" fill="#3b82f6" font-family="system-ui, sans-serif" font-size="32" text-anchor="middle" font-weight="bold">OPC-UA</text>
  <text x="570" y="400" fill="#93c5fd" font-family="monospace" font-size="14" text-anchor="middle">Browse · Read · Write · Subscribe</text>
  <!-- Line to Node-RED -->
  <g stroke="#3b82f6" stroke-width="2" opacity="0.3">
    <line x1="710" y1="360" x2="860" y2="360"/>
  </g>
  <polygon points="855,350 875,360 855,370" fill="#3b82f6" opacity="0.5"/>
  <!-- Node-RED -->
  <rect x="880" y="310" width="200" height="100" rx="16" fill="#8F0000" opacity="0.8"/>
  <text x="980" y="368" fill="white" font-family="system-ui, sans-serif" font-size="24" text-anchor="middle" font-weight="bold">Node-RED</text>
  <!-- Output arrows -->
  <g stroke="rgba(255,255,255,0.2)" stroke-width="1.5">
    <line x1="1080" y1="340" x2="1150" y2="300"/>
    <line x1="1080" y1="360" x2="1150" y2="360"/>
    <line x1="1080" y1="380" x2="1150" y2="420"/>
  </g>
  <text x="1160" y="305" fill="#94a3b8" font-family="monospace" font-size="13">Dashboard</text>
  <text x="1160" y="365" fill="#94a3b8" font-family="monospace" font-size="13">Database</text>
  <text x="1160" y="425" fill="#94a3b8" font-family="monospace" font-size="13">Cloud</text>
  <!-- Title -->
  <text x="60" y="80" fill="white" font-family="system-ui, sans-serif" font-size="42" font-weight="bold">OPC-UA Suite</text>
  <text x="60" y="120" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="22">Standardized Industrial Data Exchange</text>
  <!-- Badges -->
  <rect x="60" y="500" width="120" height="36" rx="18" fill="#8F0000"/>
  <text x="120" y="524" fill="white" font-family="system-ui, sans-serif" font-size="15" text-anchor="middle" font-weight="bold">Node-RED</text>
  <rect x="195" y="500" width="100" height="36" rx="18" fill="rgba(59,130,246,0.3)" stroke="#3b82f6" stroke-width="1"/>
  <text x="245" y="524" fill="#93c5fd" font-family="system-ui, sans-serif" font-size="15" text-anchor="middle">OPC-UA</text>
</svg>
