<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a192f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#112240;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a192f;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#1e90ff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#1e90ff;stop-opacity:0" />
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="35%">
      <stop offset="0%" style="stop-color:#00bcd4;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#00bcd4;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect width="1200" height="600" fill="url(#glow1)"/>
  <rect width="1200" height="600" fill="url(#glow2)"/>
  <!-- Network nodes -->
  <g stroke="#1e90ff" stroke-width="0.5" opacity="0.3">
